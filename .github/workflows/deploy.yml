name: Build & Deploy

# Один источник правды: React-исходники. CI собирает их Vite'ом и публикует в Pages —
# собранного index.html в репозитории больше нет, «устаревать» нечему.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install deps
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Unit tests (vitest, hermetic)
        run: npm test

      - name: RSVP proxy tests (hermetic)
        run: npm run test:rsvp-fn

      - name: Install Playwright (chromium)
        run: npx playwright install --with-deps chromium

      - name: RSVP e2e flow (mocked network)
        run: npx playwright test tests/rsvp-flow.spec.ts

      - name: Build (vite)
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
